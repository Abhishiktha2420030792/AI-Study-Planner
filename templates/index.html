<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand fw-bold">
                📚 AI Study Planner
            </span>
        </div>
    </nav>

    <!-- Header -->
    <div class="container mt-5">

        <div class="text-center mb-5">
            <h1 class="fw-bold">
                AI Study Planner using IBM watsonx.ai
            </h1>

            <p class="text-muted">
                Generate personalized study schedules using Agentic AI.
            </p>
        </div>

        <!-- Form -->

        <div class="card shadow-lg">

            <div class="card-body p-4">

                <form action="/generate" method="POST">

                    <!-- Name -->

                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Enter your name"
                            required>
                    </div>

                    <!-- Subjects -->

                    <div class="mb-3">
                        <label class="form-label">Subjects</label>
                        <textarea
                            class="form-control"
                            name="subjects"
                            rows="3"
                            placeholder="Example: DBMS, Operating Systems, Python, AI"
                            required></textarea>
                    </div>

                    <!-- Study Hours -->

                    <div class="mb-3">
                        <label class="form-label">
                            Study Hours Per Day
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="study_hours"
                            min="1"
                            max="15"
                            required>
                    </div>

                    <!-- Exam Date -->

                    <div class="mb-3">

                        <label class="form-label">
                            Exam Date
                        </label>

                        <input
                            type="date"
                            class="form-control"
                            name="exam_date"
                            required>

                    </div>

                    <!-- Goal -->

                    <div class="mb-3">

                        <label class="form-label">
                            Academic Goal
                        </label>

                        <select
                            class="form-select"
                            name="goal"
                            required>

                            <option value="">Select Goal</option>
                            <option>Pass</option>
                            <option>First Class</option>
                            <option>Distinction</option>
                            <option>Top Rank</option>

                        </select>

                    </div>

                    <!-- Difficulty -->

                    <div class="mb-4">

                        <label class="form-label">
                            Difficulty Level
                        </label>

                        <select
                            class="form-select"
                            name="difficulty"
                            required>

                            <option value="">Select</option>

                            <option>Easy</option>
                            <option>Medium</option>
                            <option>Hard</option>

                        </select>

                    </div>

                    <div class="d-grid">

                        <button class="btn btn-primary btn-lg">

                            Generate Study Plan

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
